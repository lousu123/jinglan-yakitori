<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲸岚·烧鸟 · 开业全渠道运营方案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --crimson: #8B0000;
  --fire: #CC2200;
  --fire2: #E8451A;
  --amber: #D4A017;
  --gold: #C9A84C;
  --cream: #F5EFE6;
  --text: #E8DDD0;
  --text2: #C4B8A8;
  --dim: #8A7A6A;
  --dim2: #6B5D4F;
  --border: rgba(204,34,0,0.08);
  --border2: rgba(204,34,0,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.8}

/* ===== Canvas BG ===== */
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ===== Nav ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,10,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.nav.hidden{transform:translateY(-100%)}
.nav-l{display:flex;align-items:center;gap:10px}
.nav-logo{font-family:'Noto Serif SC',serif;font-weight:900;font-size:18px;background:linear-gradient(135deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-badge{font-size:10px;color:var(--dim2);border:1px solid var(--border);padding:2px 8px;border-radius:10px}
.nav-r{display:flex;align-items:center;gap:2px}
.nav-r a{color:var(--dim);text-decoration:none;font-size:11px;padding:4px 8px;border-radius:4px;transition:all .3s;font-weight:400}
.nav-r a:hover{color:var(--amber);background:rgba(212,86,30,.08)}
.nav-toggle{display:none;background:none;border:none;color:var(--cream);font-size:22px;cursor:pointer;padding:4px}

/* ===== Hero ===== */
.hero{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 60px}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 80%,rgba(204,34,0,.08) 0%,transparent 60%),radial-gradient(ellipse at 30% 20%,rgba(212,160,23,.04) 0%,transparent 40%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 18px;border:1px solid var(--fire);border-radius:20px;font-size:12px;color:var(--fire2);letter-spacing:3px;margin-bottom:20px;animation:fadeUp .8s ease}
.hero h1{font-family:'Noto Serif SC',serif;font-size:clamp(42px,9vw,88px);font-weight:900;line-height:1.1;margin-bottom:4px;animation:fadeUp .8s ease .1s both}
.hero h1 .c1{color:var(--fire)}.hero h1 .c2{color:var(--amber)}.hero h1 .c3{color:var(--cream)}
.hero-sub{font-size:clamp(14px,2.2vw,20px);color:var(--dim);font-weight:300;letter-spacing:6px;margin-bottom:8px;animation:fadeUp .8s ease .15s both}
.hero-sub2{font-size:clamp(12px,1.6vw,16px);color:var(--dim2);font-weight:300;margin-bottom:32px;animation:fadeUp .8s ease .18s both}
.hero-stats{display:flex;gap:48px;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s ease .2s both}
.hero-stat{text-align:center}
.hero-stat-num{font-family:'Noto Serif SC',serif;font-size:34px;font-weight:700;color:var(--amber)}
.hero-stat-lbl{font-size:12px;color:var(--dim);margin-top:2px}
.hero-tag{margin-top:28px;padding:8px 24px;background:rgba(204,34,0,.06);border:1px solid var(--border2);border-radius:30px;font-size:13px;color:var(--cream);letter-spacing:1px;animation:fadeUp .8s ease .25s both}
.hero-cta{margin-top:32px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s ease .3s both}
.hero-cta a{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;text-decoration:none;border-radius:30px;font-size:14px;font-weight:500;transition:all .3s;box-shadow:0 4px 20px rgba(204,34,0,.25)}
.hero-cta a:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(204,34,0,.4)}
.hero-cta a.outline{background:transparent;border:1px solid var(--border2);box-shadow:none;color:var(--cream)}
.hero-cta a.outline:hover{background:rgba(204,34,0,.08);border-color:var(--fire)}

/* ===== Divider ===== */
.divider{position:relative;z-index:1;height:50px;display:flex;align-items:center;justify-content:center;gap:10px}
.divider .line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--fire),transparent)}
.divider .dot{width:6px;height:6px;background:var(--fire);border-radius:50%;animation:pulse 2s ease infinite}

/* ===== Section ===== */
.section{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:60px 24px}
.section-header{text-align:center;margin-bottom:40px}
.section-header .num{font-family:'Noto Serif SC',serif;font-size:48px;font-weight:900;color:var(--fire);opacity:.15;line-height:1;margin-bottom:-8px}
.section-header h2{font-family:'Noto Serif SC',serif;font-size:28px;color:var(--cream);margin-bottom:4px}
.section-header .sub{font-size:13px;color:var(--dim)}
.section-body{opacity:0;transform:translateY(30px);transition:all .7s cubic-bezier(.4,0,.2,1)}
.section-body.show{opacity:1;transform:translateY(0)}
.section-body p{color:var(--text2);font-size:14px;line-height:2;margin-bottom:12px}
.section-body p.dim{color:var(--dim);font-size:13px}
.section-body p.big{font-size:16px;color:var(--cream);font-weight:500}

/* ===== Cards ===== */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:16px 0}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin:16px 0}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:16px 0}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:18px;text-align:center;transition:all .3s}
.card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px)}
.card .v{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;color:var(--amber)}
.card .l{font-size:12px;color:var(--dim);margin-top:4px}

/* ===== Tables ===== */
.tbl-wrap{overflow-x:auto;margin:16px 0;border-radius:10px;border:1px solid rgba(255,255,255,.03)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
.tbl th{background:rgba(204,34,0,.12);color:var(--amber);padding:10px 14px;text-align:left;font-weight:500;border-bottom:2px solid var(--fire);white-space:nowrap}
.tbl td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.02);color:var(--text2)}
.tbl tr:hover td{background:rgba(255,255,255,.012)}
.tbl .hl td{background:rgba(204,34,0,.06);font-weight:500;color:var(--cream)}

/* ===== Tags ===== */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.tag{padding:4px 14px;background:rgba(204,34,0,.05);border:1px solid var(--border);border-radius:16px;font-size:12px;color:var(--text2);transition:all .3s}
.tag:hover{background:rgba(204,34,0,.1);border-color:var(--border2);color:var(--cream)}

/* ===== Feat Cards ===== */
.feat{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:16px 0}
.feat-card{background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:22px 18px;text-align:center;position:relative;overflow:hidden;transition:all .3s}
.feat-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-3px)}
.feat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fire),var(--amber))}
.feat-card .ic{font-size:30px;margin-bottom:8px}
.feat-card h4{font-size:15px;color:var(--cream);margin-bottom:6px}
.feat-card p{font-size:12px!important;color:var(--dim)!important;line-height:1.7!important}

/* ===== Pkg ===== */
.pkg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin:16px 0}
.pkg-card{background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:14px;padding:28px 22px;text-align:center;position:relative;overflow:hidden;transition:all .3s}
.pkg-card:hover{transform:translateY(-3px)}
.pkg-card.hot{border-color:var(--fire);background:linear-gradient(180deg,rgba(204,34,0,.06),var(--bg2))}
.pkg-card.hot::before{content:'推荐';position:absolute;top:12px;right:-28px;background:var(--fire);color:#fff;font-size:10px;padding:2px 32px;transform:rotate(45deg);letter-spacing:1px}
.pkg-card .tag{font-size:11px;color:var(--fire2);margin-bottom:4px;letter-spacing:1px}
.pkg-card .nm{font-family:'Noto Serif SC',serif;font-size:19px;color:var(--cream);margin-bottom:4px}
.pkg-card .pr{font-family:'Noto Serif SC',serif;font-size:36px;font-weight:900;color:var(--amber);margin-bottom:8px}
.pkg-card .pr small{font-size:14px;color:var(--dim)}
.pkg-card .desc{font-size:12px;color:var(--dim);line-height:1.8}

/* ===== Compare ===== */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
.cmp-col{background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:20px;transition:all .3s}
.cmp-col:hover{transform:translateY(-2px)}
.cmp-col h4{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.cmp-col.g h4{color:var(--amber)}.cmp-col.b h4{color:var(--dim)}
.cmp-col p{font-size:12px!important;color:var(--dim)!important;margin-bottom:6px!important;line-height:1.8!important;padding-left:12px;position:relative}
.cmp-col p::before{content:'·';position:absolute;left:0;color:var(--dim2)}

/* ===== Risk ===== */
.risk{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin:16px 0}
.risk-card{background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:20px;transition:all .3s}
.risk-card:hover{background:var(--bg3);transform:translateY(-2px)}
.risk-card .rl{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;margin-bottom:8px;font-weight:500}
.risk-card .rl.h{background:rgba(204,34,0,.12);color:var(--fire2)}
.risk-card .rl.m{background:rgba(212,160,23,.1);color:var(--amber)}
.risk-card .rl.l{background:rgba(100,200,100,.06);color:#6c6}
.risk-card h4{font-size:14px;color:var(--cream);margin-bottom:6px}
.risk-card p{font-size:12px!important;color:var(--dim)!important;line-height:1.7!important}

/* ===== Slogan ===== */
.slogan-box{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:12px 0}
.slogan-item{padding:16px;background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:10px;text-align:center;font-size:13px;color:var(--text2);font-style:italic;transition:all .3s}
.slogan-item:hover{border-color:var(--border2);background:var(--bg3)}
.slogan-item .bd{display:inline-block;padding:2px 10px;background:var(--fire);color:#fff;border-radius:4px;font-size:10px;font-style:normal;margin-bottom:8px;letter-spacing:1px}

/* ===== Budget ===== */
.budget-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.budget-tab{padding:8px 20px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--dim);cursor:pointer;transition:all .3s;background:transparent;font-family:'Noto Sans SC',sans-serif}
.budget-tab:hover{border-color:var(--border2);color:var(--cream)}
.budget-tab.active{background:var(--fire);border-color:var(--fire);color:#fff}
.budget-panel{display:none}
.budget-panel.active{display:block;animation:fadeUp .4s ease}

/* ===== Timeline ===== */
.timeline{position:relative;margin:24px 0;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--fire),var(--amber),transparent)}
.tl-item{position:relative;margin-bottom:24px;padding-left:20px}
.tl-item::before{content:'';position:absolute;left:-21px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--fire);border:2px solid var(--bg)}
.tl-item:nth-child(2)::before{background:var(--amber)}
.tl-item:nth-child(3)::before{background:var(--gold)}
.tl-item:nth-child(4)::before{background:var(--cream)}
.tl-item:nth-child(5)::before{background:var(--text2)}
.tl-item .phase{font-size:11px;color:var(--fire2);font-weight:500;letter-spacing:1px}
.tl-item .time{font-size:12px;color:var(--dim);margin-bottom:4px}
.tl-item h4{font-size:15px;color:var(--cream);margin-bottom:4px}
.tl-item p{font-size:13px!important;color:var(--dim)!important;line-height:1.7!important}

/* ===== KPI Summary ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin:16px 0}
.kpi-card{background:var(--bg2);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:18px 14px;text-align:center;transition:all .3s}
.kpi-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px)}
.kpi-card .cat{font-size:10px;color:var(--dim2);letter-spacing:1px;margin-bottom:4px}
.kpi-card .val{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;color:var(--amber)}
.kpi-card .lbl{font-size:11px;color:var(--dim);margin-top:2px}

/* ===== Footer ===== */
.footer{position:relative;z-index:1;text-align:center;padding:50px 24px;border-top:1px solid rgba(255,255,255,.03)}
.footer .br{font-family:'Noto Serif SC',serif;font-size:20px;background:linear-gradient(135deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.footer .cr{color:var(--dim);font-size:12px}
.footer .cr a{color:var(--amber);text-decoration:none}

/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* ===== Responsive ===== */
@media(max-width:768px){
  .hero-stats{gap:24px}
  .nav-r{display:none}
  .nav-r.open{display:flex;flex-direction:column;position:absolute;top:56px;left:0;right:0;background:rgba(10,10,10,.96);backdrop-filter:blur(24px);padding:12px;border-bottom:1px solid var(--border);gap:4px}
  .nav-toggle{display:block}
  .cmp{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr 1fr}
  .pkg,.feat,.risk,.grid3,.grid4{grid-template-columns:1fr}
  .section{padding:40px 16px}
  .budget-tabs{flex-direction:column}
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:36px}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<nav class="nav" id="nav">
  <div class="nav-l">
    <div class="nav-logo">鲸岚·烧鸟</div>

  </div>

  <div class="nav-r" id="navLinks"></div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-badge">✦ 以美团智能收银为核心的全渠道运营方案 ✦</div>
  <h1><span class="c1">鲸岚</span><span class="c2">·</span><span class="c3">烧鸟</span></h1>
  <div class="hero-sub">开业引流 · 全渠道运营</div>

    <div class="hero-stat"><div class="hero-stat-num">150㎡</div><div class="hero-stat-lbl">日式烧鸟空间</div></div>
    <div class="hero-stat"><div class="hero-stat-num">45天</div><div class="hero-stat-lbl">装修期蓄水</div></div>
    <div class="hero-stat"><div class="hero-stat-num">1500+</div><div class="hero-stat-lbl">预计蓄水人数</div></div>
    <div class="hero-stat"><div class="hero-stat-num">¥8万</div><div class="hero-stat-lbl">首月营收目标</div></div>
  </div>
  <div class="hero-tag">🔥 装修期45天二维码蓄水 · 鲸岚烧肉品牌联动 · 三平台运营 · 复购券自动化</div>
  <div class="hero-cta">
    <a href="#ch-0">📖 查看完整方案</a>

</section>

<div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>

<!-- ===== TOC ===== -->

  <div class="section-header">
    <div class="num">00</div>
    <h2>方案目录</h2>
    <div class="sub">共 22 个章节 · 点击跳转</div>
  </div>
  <div class="section-body show">
    <div class="grid3" id="tocGrid"></div>
  </div>
</section>

<div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>

<!-- ===== CONTENT ===== -->
<div id="content"></div>

<footer class="footer">
  <div class="br">鲸岚·烧鸟</div>

</footer>

<script>
// ===== Canvas Particles =====
const c=document.getElementById('canvas'),ctx=c.getContext('2d');
let pts=[],embers=[];
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener('resize',resize);
class Pt{constructor(){this.reset()}
reset(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.size=Math.random()*2+.3;this.sx=(Math.random()-.5)*.25;this.sy=-Math.random()*.15-.08;this.o=Math.random()*.3+.05}
update(){this.x+=this.sx;this.y+=this.sy;if(this.y<-10||this.x<-10||this.x>c.width+10)this.reset();if(this.y<c.height*.25)this.y=c.height}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(204,34,0,${this.o})`;ctx.fill()}}
class Em{constructor(){this.x=Math.random()*c.width;this.y=c.height-20;this.size=Math.random()*3+1;this.sy=Math.random()*1.5+.5;this.sx=(Math.random()-.5)*.5;this.l=1;this.d=Math.random()*.006+.003}
update(){this.y-=this.sy;this.x+=this.sx;this.l-=this.d}
draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.l,0,Math.PI*2);let g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*this.l);g.addColorStop(0,`rgba(255,80,40,${this.l})`);g.addColorStop(.5,`rgba(212,160,23,${this.l*.5})`);g.addColorStop(1,`rgba(204,34,0,0)`);ctx.fillStyle=g;ctx.fill()}}
function spawn(){if(Math.random()<.12)embers.push(new Em())}
function anim(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.update();p.draw()});spawn();embers.forEach(e=>{e.update();e.draw()});embers=embers.filter(e=>e.l>0);if(embers.length>50)embers.splice(0,embers.length-50);requestAnimationFrame(anim)}
for(let i=0;i<60;i++)pts.push(new Pt());anim();

// ===== Data =====
const chapters=[
{num:'01',title:'背景概述',sub:'门店信息 · 品牌关系 · 核心目标',
content:`<p><strong>鲸岚·烧鸟</strong>位于天津中原·瞰海一楼，毗邻商场一楼出入口，拥有绝佳的自然客流位置。门店分为两个独立空间：</p>
<div class="grid2">
<div class="card"><div class="v">150㎡</div><div class="l">鲸岚·烧鸟（日式烧烤）<br>老板独立运营 · 鲸岚品牌</div></div>
<div class="card"><div class="v">100㎡+</div><div class="l">精酿空间（合伙经营）<br>品牌名待定 · 与烧鸟相邻</div></div>
</div>
<p>两个空间物理上不打通，顾客需要出门绕行。精酿空间与鲸岚·烧鸟分属不同品牌/合伙关系，但可进行商业合作层面的软联动（联合套餐、互相导流、共用私域）。</p>
<p class="highlight"><strong>⚠️ 体验断层解决方案：</strong>两店不打通意味着顾客在烧鸟吃完后，需要出门再进另一家，转化损耗较大。为此设计三重引导机制：<br>
① <strong>专人带引导：</strong>收银员结账时主动告知「往右走20步就是精酿区，我带您过去看看」，由专人引导至精酿空间门口，降低绕行心理门槛<br>
② <strong>实体指引牌：</strong>在两店门口及中间通道设置统一风格的指引立牌（日式木牌风格），标注「精酿空间 → 20步」「鲸岚·烧鸟 → 20步」，让顾客清晰感知两店距离很近<br>
③ <strong>联合消费激励：</strong>出示另一店消费凭证可享专属折扣，用利益驱动顾客主动跨店</p>
<p><strong>品牌背景：</strong>老板本身经营鲸岚烧肉品牌，楼上三楼的鲸岚烧肉也在同步装修中（尚未营业）。鲸岚品牌在本地已有一定知名度和线上社群基础，这是鲸岚·烧鸟开业最大的流量来源。</p>
<p><strong>核心目标：</strong>以美团智能版收银系统为中枢，通过开业前45天开始的线下二维码领券蓄水，开业后全渠道自动沉淀私域会员，配合复购券和三平台线上运营，实现"开业即火爆，复购有保障"。</p>
<div class="tags"><span class="tag">🐋 鲸岚品牌背书</span><span class="tag">📍 商场出入口黄金位置</span><span class="tag">🏗️ 装修期45天蓄水</span><span class="tag">🍺 精酿空间联动</span><span class="tag">🏢 楼上鲸岚烧肉同步装修</span></div>`},

{num:'08',title:'精酿空间专项运营',sub:'引流策略 · 联动合作 · 竞争应对',
content:`<p>精酿空间为合伙经营，与鲸岚·烧鸟分属不同品牌。未来对面外滩将形成精酿一条街，需提前建立竞争优势。精酿的高颜值属性在小红书和抖音上传播潜力极大，建议适当加码预算。</p>
<div class="feat">
<div class="feat-card"><div class="ic">🍺</div><h4>精酿品鉴套餐</h4><p>19.9元精酿品鉴套餐（3杯不同口味），降低尝鲜门槛</p></div>
<div class="feat-card"><div class="ic">📅</div><h4>每周品鉴会</h4><p>每周五精酿品鉴会（付费预约制），打造社群粘性</p></div>
<div class="feat-card"><div class="ic">💳</div><h4>会员储值</h4><p>充300赠50，充500赠120，锁定复购</p></div>
<div class="feat-card"><div class="ic">🎉</div><h4>包场服务</h4><p>精酿生日派对/团建包场服务，拓展企业客户</p></div>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">精酿预算加码建议</h3>
<p>原方案精酿预算偏低（小红书博主仅500元、抖音达人仅1000元），精酿的颜值内容在小红书传播潜力极大，建议调整：</p>
<div class="tbl-wrap">
<table class="tbl">
<tr><th>渠道</th><th>原预算</th><th>建议调整</th><th>调整理由</th></tr>
<tr><td><strong>小红书探店博主</strong></td><td>500元</td><td><strong>2,000元</strong></td><td>精酿的高颜值+氛围感内容在小红书天然适合种草，加码后可覆盖5-8位本地博主</td></tr>
<tr><td><strong>抖音达人探店</strong></td><td>1,000元</td><td><strong>2,500元</strong></td><td>精酿打酒过程+泡沫特写+顾客聚会场景，抖音同城流量转化率高</td></tr>
<tr><td><strong>精酿品鉴会物料</strong></td><td>—</td><td><strong>500元</strong></td><td>每周五品鉴会配套物料（杯垫、品鉴卡、拍照道具）</td></tr>
<tr class="hl"><td><strong>精酿合计</strong></td><td><strong>1,500元</strong></td><td><strong>5,000元</strong></td><td>加码后精酿预算占比从9%提升至20%，更合理</td></tr>
</table>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">与鲸岚·烧鸟的联动合作</h3>
<p>· 联合套餐：推出「烧鸟+精酿」联名套餐，一票两店使用</p>
<p>· 互相导流：鲸岚·烧鸟消费满100元赠精酿空间体验券；精酿空间顾客到店赠鲸岚·烧鸟9折券</p>
<p>· 共用私域：两店共用微信群，联合推送活动信息</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">精酿一条街竞争应对</h3>
<p>· 提前建立精酿社群，积累种子用户，打造社群壁垒</p>
<p>· 打造「烧鸟+精酿」差异化组合，区别于纯精酿酒吧——这是精酿一条街其他纯酒吧无法提供的用餐体验</p>
<p>· 培养精酿KOC客户，形成口碑传播</p>

<p class="highlight"><strong>⚠️ 精酿品牌名：</strong>方案中精酿空间一直以"品牌名待定"出现，但品牌名是物料设计、小红书种草、POI定位的基础。建议开业前至少确定一个暂用名，哪怕只是「鲸岚·精酿」或独立名字，以便提前制作物料和铺设线上入口。品牌名一旦确定，方案中所有「精酿空间」均可统一替换。</p>
<p>· 定期举办精酿品鉴课/酿酒体验活动，建立专业认知</p>`},

{num:'09',title:'大众点评运营',sub:'合规冲榜 · 关键词优化 · 评价积累',
content:`<p><strong>平台机制理解（2026年核心变化）：</strong>严厉打击"赠菜换好评"，诱导评价会导致店铺星级下降。"真实评价数+近30天回复率+顾客证言质量"成排名核心。一条带图、带细节的真实评价权重是简单好评的5倍。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">执行动作</h3>
<div class="feat">
<div class="feat-card"><div class="ic">🎯</div><h4>动作一：内测体验</h4><p>开业前2天邀请30-50人免费体验，要求发布带图真实评价。食材成本约500元。</p></div>
<div class="feat-card"><div class="ic">📝</div><h4>动作二：合规引导</h4><p>结账后引导扫码评价（不提赠品）。24小时内回复差评。高质量评价点赞互动。</p></div>
<div class="feat-card"><div class="ic">🔑</div><h4>动作三：关键词优化</h4><p>引导评价包含：烧鸟拼盘、鸡腿肉、提灯、炭火香气、紫苏鸡腿肉、明太子鸡肉棒等。</p></div>
<div class="feat-card"><div class="ic">🏆</div><h4>动作四：冲击新店榜</h4><p>区域新店榜Top10→南开区烧烤榜Top5→冲刺「必吃榜」「热门榜」双榜上榜。</p></div>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">KPI</h3>
<div class="grid4">
<div class="card"><div class="v">4.0星</div><div class="l">首月评分</div></div>
<div class="card"><div class="v">100条+</div><div class="l">首月评价</div></div>
<div class="card"><div class="v">500个</div><div class="l">首月收藏</div></div>
<div class="card"><div class="v">70%</div><div class="l">团购核销率</div></div>
</div>`},

{num:'10',title:'抖音运营',sub:'达人矩阵 · 本地推投流 · 团购组品',
content:`<p><strong>平台机制理解（2026年核心变化）：</strong>算法从"内容互动权重"转向"内容质量×交易效率×POI资产"三维评分。"有效转化率"权重升至42%。同城搜索流量占比31%。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">执行动作</h3>
<div class="feat">
<div class="feat-card"><div class="ic">🎬</div><h4>动作一：原生内容矩阵</h4><p>每天发布：炭火特写+烧鸟滋滋冒油+顾客真实用餐场景。添加POI+DOU+同城定向。</p></div>
<div class="feat-card"><div class="ic">🤝</div><h4>动作二：达人探店矩阵</h4><p>总预算6000元。选择本地美食类达人，视频包含POI定位+团购链接。</p></div>
<div class="feat-card"><div class="ic">📍</div><h4>动作三：本地推投流</h4><p>地理围栏3公里，人群18-35岁美食兴趣。首周1000元→次周500元→三四周各250元。</p></div>
<div class="feat-card"><div class="ic">🛒</div><h4>动作四：团购组品</h4><p>68元双人套餐（与点评一致，便于统一核销）。</p></div>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">KPI</h3>
<div class="grid3">
<div class="card"><div class="v">50%</div><div class="l">团购核销率</div></div>
<div class="card"><div class="v">8-10条</div><div class="l">达人探店视频</div></div>
<div class="card"><div class="v">5万+</div><div class="l">POI曝光量</div></div>
</div>
<p class="highlight"><strong>⚠️ 本地推ROI目标调整：</strong>原方案ROI≥1.5偏保守。日式烧烤+精酿品类在本地推上通常能跑到2.5-3，首月目标应拉高至<strong>ROI≥2.5</strong>，倒逼执行动作更精准——达人视频发布后立即追投高互动内容，对完播率＞45%、评论率＞3%的视频即时加投，确保每一分投流预算都花在刀刃上。</p>`},

{num:'11',title:'小红书运营',sub:'矩阵号 · 4类内容模板 · UGC激发',
content:`<p><strong>平台机制理解（2026年核心变化）：</strong>流量极度偏向"真实、就近、有用、可抄"的同城内容。日式烧鸟的高颜值属性，与小红书图文调性天然契合。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">四种高转化内容模板</h3>
<div class="feat">
<div class="feat-card"><div class="ic">🗺️</div><h4>① 就近懒人攻略</h4><p>《天津中原商圈打工人下班觅食指南·烧鸟》</p></div>
<div class="feat-card"><div class="ic">📸</div><h4>② 真实到店体验</h4><p>原相机直出：进店→就座→上菜→开吃→买单</p></div>
<div class="feat-card"><div class="ic">🎯</div><h4>③ 场景刚需套餐</h4><p>绑定场景做内容，挂载团购链接</p></div>
<div class="feat-card"><div class="ic">💡</div><h4>④ 避坑干货</h4><p>「别再说烧鸟就是鸡肉串了！不同部位怎么点才专业？」</p></div>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">执行动作</h3>
<p><strong>矩阵号策略：</strong>品牌号（企业号）发布官方内容 + 员工号/素人号真实日常内容</p>
<p><strong>POI设置：</strong>完成企业号认证，开通团购功能。套餐标题包含关键词（如"天津日式烧鸟·双人尝鲜套餐"）。探店博主预算：2500元。</p>
<p><strong>UGC激发：</strong>顾客拍照时主动让位置→用餐结束后引导分享→社群发起"鲸岚探店日记"活动，优秀笔记送50元券。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">KPI</h3>
<div class="grid3">
<div class="card"><div class="v">15篇+</div><div class="l">品牌号笔记</div></div>
<div class="card"><div class="v">10篇+</div><div class="l">UGC笔记</div></div>
<div class="card"><div class="v">3万+</div><div class="l">POI浏览量</div></div>
</div>`},

{num:'12',title:'收银系统与话术标准化',sub:'全链路流程 · 五句话术 · 台卡布置',
content:`<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">收银系统全链路流程</h3>
<div class="timeline">
<div class="tl-item"><div class="phase">步骤一</div><h4>后台营销设置</h4><p>创建满50元可用10元通用券，生成领券二维码</p></div>
<div class="tl-item"><div class="phase">步骤二</div><h4>装修期铺设</h4><p>围挡/便利店/试吃台铺设二维码，顾客扫码领券</p></div>
<div class="tl-item"><div class="phase">步骤三</div><h4>到店核销</h4><p>报手机号→收银员查询→系统一键核销→自动留存会员</p></div>
<div class="tl-item"><div class="phase">步骤四</div><h4>复购券自动推送</h4><p>消费后次日系统自动发复购券，5天未复购再次触达</p></div>
<div class="tl-item"><div class="phase">步骤五</div><h4>私域+口碑引导</h4><p>收银台摆放加群二维码+官方点星码+收藏二维码</p></div>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">收银员五句话术标准化</h3>
<div class="slogan-box">
<div class="slogan-item"><div class="bd">① 核销</div>「您好，您的优惠券已核销，欢迎下次光临。」</div>
<div class="slogan-item"><div class="bd">② 满赠</div>「今天消费已满100元，赠您一张精酿空间体验券，欢迎去隔壁坐坐。」</div>
<div class="slogan-item"><div class="bd">③ 会员</div>「您还没加入会员吧？报一下手机号，今天加入额外送您一份小菜。」</div>
<div class="slogan-item"><div class="bd">④ 口碑</div>「您吃得满意的话，方便的话帮我们点个星、收藏一下，非常感谢。」</div>
<div class="slogan-item"><div class="bd">⑤ 联动</div>「楼上鲸岚烧肉也在装修中，开业后凭我们小票到楼上也有优惠哦。」</div>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">台卡布置</h3>
<p>台卡①：消费满100元赠精酿空间体验券（与精酿空间合作）</p>
<p>台卡②：社群加群二维码+新人红包规则</p>
<p>台卡③：鲸岚烧肉品牌联动——凭小票互享优惠</p>
<p>台卡④：官方点星码+收藏二维码（合规摆放）</p>`},

{num:'13',title:'活动节奏总览',sub:'蓄水期 → 预热期 → 爆发期 → 积累期 → 稳定期',
content:`<div class="timeline">
<div class="tl-item"><div class="phase">蓄水期</div><div class="time">开业前45-15天</div><h4>装修围挡铺设二维码</h4><p>便利店桌贴+精酿空间互推+鲸岚烧肉社群预热。目标：累计领券1000-1500人。</p></div>
<div class="tl-item"><div class="phase">预热期</div><div class="time">开业前15-3天</div><h4>商场出入口拦截+社区派发</h4><p>鲸岚烧肉装修处导流+KOC探店。目标：累计领券500-700人。</p></div>
<div class="tl-item"><div class="phase">爆发期</div><div class="time">开业1-7天</div><h4>68元套餐核销+全场8.8折</h4><p>发圈活动+每日限定烧鸟+内测评价发布。目标：拉升人气，积累100+评价。</p></div>
<div class="tl-item"><div class="phase">积累期</div><div class="time">开业2-4周</div><h4>复购券自动化+精酿联动</h4><p>精酿品鉴会+社群日常运营+达人探店发布。目标：沉淀私域，提升复购。</p></div>
<div class="tl-item"><div class="phase">稳定期</div><div class="time">开业2-3个月</div><h4>私域精细化运营</h4><p>精酿一条街竞争应对+三平台常态化运营+品牌联动。目标：日均单量稳定，复购率20%+。</p></div>
</div>`},

{num:'17',title:'总结',sub:'核心策略 · 预期成果',
content:`<p class="big">以美团智能收银为核心，构建完整私域引流与复购闭环</p>
<p>本方案围绕鲸岚·烧鸟的独特优势——鲸岚品牌背书+商场出入口位置+装修期45天蓄水+精酿空间联动——制定了完整的开业前线下引流及前期营销方案。</p>
<p><strong>核心策略：</strong>以鲸岚烧肉品牌联动为最大流量来源，以装修期45天二维码铺设为核心蓄水手段，以大众点评/抖音/小红书三平台线上运营为曝光引擎，以私域社群和复购券自动化为长期复购保障。</p>
<p><strong>与精酿空间联动：</strong>通过联合套餐、互相导流、共用私域，实现「烧鸟+精酿」差异化体验，同时为精酿空间应对未来精酿一条街竞争提供助力。</p>
<p><strong>预算三档可选：</strong>基础版¥3,000 / 标准版¥8,000 / 完整版¥15,600（均为现金支出，不含让利成本），丰俭由人。</p>
<p><strong>核心目标：</strong>点评评分4.0星+、收藏500+、团购核销率70%、首月营业额8万+，为鲸岚品牌在天津市场的长期发展打下坚实基础。</p>

{num:'18',title:'鲸岚烧肉三店联动',sub:'品牌矩阵 · 三店互导 · 超级引流资产',
content:`<p class="big">三楼鲸岚烧肉同步装修中——这是整份方案里被严重低估的超级引流资产</p>
<p>鲸岚烧肉与鲸岚·烧鸟同属鲸岚品牌，且位于同一栋楼的三楼。等烧肉开业后，完全可以形成<strong>「烧鸟+精酿+烧肉」三店品牌矩阵</strong>，互相导流，形成品牌合力。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">三店联动设计</h3>
<div class="tbl-wrap">
<table class="tbl">
<tr><th>联动方式</th><th>具体操作</th><th>预期效果</th></tr>
<tr><td><strong>品牌通用储值卡</strong></td><td>推出鲸岚品牌通用储值卡，烧鸟+烧肉两店通用（精酿可协商加入）</td><td>打通品牌消费闭环，提升客单价</td></tr>
<tr><td><strong>消费互享折扣</strong></td><td>任一店消费后，凭小票到另两店享9折优惠</td><td>三店互相导流，提升复购</td></tr>
<tr><td><strong>联合会员体系</strong></td><td>三店共用会员体系，消费积分通存通兑</td><td>扩大私域池，提升会员价值</td></tr>
<tr><td><strong>品牌矩阵宣传</strong></td><td>三店菜单/台卡/海报互相露出，形成「鲸岚美食矩阵」认知</td><td>强化品牌心智，降低获客成本</td></tr>
<tr><td><strong>联合活动日</strong></td><td>每月设「鲸岚品牌日」，三店同步推出限定套餐/折扣</td><td>制造话题，集中引爆</td></tr>
</table>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">烧肉开业前的蓄水准备</h3>
<p>鲸岚烧肉装修期间（与烧鸟同步），即可提前为烧肉蓄水：</p>
<p>· 在鲸岚·烧鸟收银台放置烧肉店开业预告+领券二维码</p>
<p>· 在烧鸟社群中定期推送烧肉装修进度+开业福利预告</p>
<p>· 烧鸟顾客结账时话术：「楼上鲸岚烧肉也在装修中，开业后凭我们小票到楼上也有优惠哦」</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">鲸岚烧肉开业时间轴与联动节奏</h3>
<p>鲸岚烧肉的开业时间直接影响三店联动策略的执行节奏，需分场景设计：</p>
<div class="tbl-wrap">
<table class="tbl">
<tr><th>场景</th><th>烧肉开业时间</th><th>联动策略</th></tr>
<tr><td><strong>场景A：烧肉与烧鸟同期开业</strong></td><td>相差1个月内</td><td>三店同步推广，联合开业活动，品牌通用储值卡同步上线，三店互相导流最大化</td></tr>
<tr><td><strong>场景B：烧肉晚1-3个月</strong></td><td>烧鸟开业后1-3个月</td><td>烧鸟先积累口碑和会员，为烧肉蓄水；烧肉开业时烧鸟已有稳定客流，可直接导流上楼</td></tr>
<tr><td><strong>场景C：烧肉晚3个月以上</strong></td><td>烧鸟开业后3个月+</td><td>烧鸟独立运营建立品牌认知，烧肉开业时作为"新店"重新引爆话题，三店联动作为第二波营销高潮</td></tr>
</table>
</div>
<p><strong>建议：</strong>无论烧肉何时开业，烧鸟开业期间就应开始为烧肉蓄水（收银台预告+社群进度推送），让烧肉开业时已有"准顾客"基础。</p>
<p>· 烧鸟开业活动期间，同步收集顾客对烧肉的期待和偏好，为烧肉开业提供选品参考</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">品牌矩阵长期价值</h3>
<div class="feat">
<div class="feat-card"><div class="ic">🐋</div><h4>品牌认知叠加</h4><p>三店覆盖「烧鸟（轻食）+精酿（社交）+烧肉（正餐）」全场景，强化鲸岚品牌在天津日式餐饮领域的心智占位</p></div>
<div class="feat-card"><div class="ic">🔄</div><h4>流量循环利用</h4><p>一店获客→三店共享→交叉复购，单个获客成本被三店分摊，ROI大幅提升</p></div>
<div class="feat-card"><div class="ic">🛡️</div><h4>竞争壁垒</h4><p>三店品牌矩阵形成规模效应，竞品难以复制，为未来精酿一条街竞争提供品牌护城河</p></div>
</div>`}

{num:'20',title:'风险预案B计划',sub:'如果不行怎么办 · 兜底策略',
content:`<p class="big">所有方案都是"乐观路径"，但现实往往不按剧本走。以下为关键风险点的B计划。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">风险1：装修期领券量不足</h3>
<p><strong>目标：</strong>1500人 &nbsp;|&nbsp; <strong>预警线：</strong>D-15天时不足800人</p>
<p><strong>B计划：</strong></p>
<p>· 追加社区地推频次，从每天2小时增至4小时</p>
<p>· 在商场内部增加二维码铺设点（电梯间、洗手间门口）</p>
<p>· 鲸岚烧肉社群加推一轮，附带"老客专属福利"刺激领券</p>
<p>· 启动"扫码领券+抽奖"活动（奖品：精酿品鉴券），提升扫码意愿</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">风险2：开业首周核销率低于30%</h3>
<p><strong>目标：</strong>60% &nbsp;|&nbsp; <strong>预警线：</strong>开业第3天核销率不足30%</p>
<p><strong>B计划：</strong></p>
<p>· 立即启动短信/电话提醒：对已领券未核销顾客发送"开业限时福利"提醒</p>
<p>· 追加朋友圈广告投放（地理围栏3公里），提醒领券顾客到店</p>
<p>· 延长68元套餐限量时间，从3天延至7天</p>
<p>· 收银台增加"领券核销有礼"活动，核销即赠小菜</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">风险3：大众点评评分掉到3.5以下</h3>
<p><strong>目标：</strong>4.0星 &nbsp;|&nbsp; <strong>预警线：</strong>评分低于3.8</p>
<p><strong>B计划：</strong></p>
<p>· 立即排查差评原因（口味/服务/环境），48小时内整改</p>
<p>· 对差评顾客进行一对一沟通，提供补偿方案（免单/赠券）</p>
<p>· 邀请橙V用户到店体验，发布高质量带图评价</p>
<p>· 暂停所有"引导评价"动作，避免被平台判定为刷评</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">风险4：精酿空间开业后客流不足</h3>
<p><strong>B计划：</strong></p>

{num:'22',title:'每日运营SOP',sub:'每天做什么 · 每周做什么 · 照着执行',
content:`<p class="big">开业后每天/每周的具体执行动作，老板可以直接打印贴在墙上照着做。</p>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">每日SOP</h3>
<div class="tbl-wrap">
<table class="tbl">
<tr><th>时间</th><th>任务</th><th>执行人</th><th>备注</th></tr>
<tr><td><strong>09:00</strong></td><td>检查大众点评/美团评价，回复所有新评价（含差评）</td><td>店长</td><td>差评24小时内必须回复</td></tr>
<tr><td><strong>10:00</strong></td><td>社群推送今日限定烧鸟+午市福利</td><td>店长</td><td>配图+定位</td></tr>
<tr><td><strong>11:00</strong></td><td>检查抖音/小红书后台，回复评论和私信</td><td>店长</td><td>保持互动率</td></tr>
<tr><td><strong>12:00</strong></td><td>午市高峰：关注出餐速度+顾客反馈</td><td>全员</td><td>—</td></tr>
<tr><td><strong>14:00</strong></td><td>午市复盘：记录午市单量+客单价+问题</td><td>店长</td><td>填写日报</td></tr>
<tr><td><strong>15:00</strong></td><td>发布小红书/抖音内容（每日1条）</td><td>店长</td><td>原相机直出+POI定位</td></tr>
<tr><td><strong>16:00</strong></td><td>社群推送晚市福利+精酿推荐</td><td>店长</td><td>配图+定位</td></tr>
<tr><td><strong>17:00</strong></td><td>晚市高峰：关注出餐速度+顾客反馈</td><td>全员</td><td>—</td></tr>
<tr><td><strong>21:00</strong></td><td>晚市复盘：记录晚市单量+客单价+问题</td><td>店长</td><td>填写日报</td></tr>
<tr><td><strong>21:30</strong></td><td>检查次日食材库存+下单补货</td><td>后厨</td><td>—</td></tr>
</table>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">每周SOP</h3>
<div class="tbl-wrap">
<table class="tbl">
<tr><th>时间</th><th>任务</th><th>执行人</th></tr>
<tr><td><strong>周一</strong></td><td>上周数据复盘（单量/营收/评价/会员增长/核销率）+ 本周计划制定</td><td>老板+店长</td></tr>
<tr><td><strong>周二</strong></td><td>检查复购券推送情况+调整券策略</td><td>店长</td></tr>
<tr><td><strong>周三</strong></td><td>联系本周探店达人/博主，确认探店时间</td><td>店长</td></tr>
<tr><td><strong>周四</strong></td><td>精酿品鉴会准备（物料/酒品/报名确认）</td><td>精酿合伙人</td></tr>
<tr><td><strong>周五</strong></td><td>精酿品鉴会（晚7点-9点）+ 社群直播/图文同步</td><td>精酿合伙人+店长</td></tr>
<tr><td><strong>周六</strong></td><td>周末高峰：加大社群推送频次+关注排队情况</td><td>全员</td></tr>
<tr><td><strong>周日</strong></td><td>周末高峰：收集顾客反馈+拍照素材积累</td><td>店长</td></tr>
</table>
</div>
<h3 style="color:var(--amber);font-size:17px;margin:16px 0 8px">每月SOP</h3>
<div class="feat">
<div class="feat-card"><div class="ic">📊</div><h4>月度数据复盘</h4><p>对比KPI完成情况，分析差距原因，制定下月改进计划</p></div>
<div class="feat-card"><div class="ic">🎯</div><h4>会员日运营</h4><p>每月8号会员日：全场8.8折+双倍积分+专属福利</p></div>
<div class="feat-card"><div class="ic">🔄</div><h4>复购券策略调整</h4><p>根据上月数据调整券面额和有效期，优化ROI</p></div>
<div class="feat-card"><div class="ic">📸</div><h4>内容素材更新</h4><p>更新菜单拍照+环境拍照+顾客好评截图，为下月内容做准备</p></div>
</div>`}
];

// ===== Render TOC =====
const tg=document.getElementById('tocGrid');
chapters.forEach((ch,i)=>{
  const btn=document.createElement('div');btn.className='card';btn.style.cursor='pointer';
  btn.innerHTML=`<div class="v" style="font-size:20px;color:var(--fire)">${ch.num}</div><div class="l" style="font-size:13px;color:var(--cream);font-weight:500">${ch.title}</div><div class="l" style="font-size:11px">${ch.sub}</div>`;
  btn.onclick=()=>document.getElementById(`ch-${i}`).scrollIntoView({behavior:'smooth'});
  tg.appendChild(btn);
});

// ===== Render Content =====
const ct=document.getElementById('content');
chapters.forEach((ch,i)=>{
  const sec=document.createElement('section');sec.className='section';sec.id=`ch-${i}`;
  sec.innerHTML=`<div class="section-header"><div class="num">${ch.num}</div><h2>${ch.title}</h2><div class="sub">${ch.sub}</div></div><div class="section-body" id="body-${i}">${ch.content}</div>`;
  ct.appendChild(sec);
});

// ===== Nav Links =====
const nl=document.getElementById('navLinks');
chapters.forEach((ch,i)=>{
  const a=document.createElement('a');a.href=`#ch-${i}`;a.textContent=ch.num;a.title=ch.title;
  nl.appendChild(a);
});

// ===== Nav Toggle =====
document.getElementById('navToggle').onclick=()=>document.getElementById('navLinks').classList.toggle('open');

// ===== Scroll Animations =====
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')})},{threshold:.08});
document.querySelectorAll('.section-body').forEach(el=>obs.observe(el));

// ===== Nav Hide on Scroll =====
let ls=0;
addEventListener('scroll',()=>{
  const s=scrollY,n=document.getElementById('nav');
  if(s>300)n.classList.toggle('hidden',s>ls&&s>500);else n.classList.remove('hidden');
  ls=s;
});

// ===== Budget Tabs =====
document.querySelectorAll('.budget-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.budget-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.budget-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
  });
});
</script>
</body>
</html>
