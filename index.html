<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲸岚·烧鸟 开业引流方案</title>
<style>
:root{--bg:#0f0b0a;--card:#1a1412;--cream:#f5f0eb;--dim:#998e86;--fire:#c0392b;--amber:#d4a04a;--gold:#f0c040;--accent:#e8d5b7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--cream);line-height:1.8;padding:0}
.hero{background:linear-gradient(135deg,#1a0a08 0%,#2c1810 50%,#1a1412 100%);padding:60px 20px 40px;text-align:center;border-bottom:2px solid var(--fire)}
.hero h1{font-size:2.2em;color:var(--fire);margin-bottom:8px;letter-spacing:2px}
.hero .sub{color:var(--gold);font-size:1.1em;margin-bottom:16px}
.hero .info{color:var(--dim);font-size:.9em;line-height:1.6}
.toc{max-width:900px;margin:0 auto;padding:30px 20px}
.toc h2{text-align:center;color:var(--gold);margin-bottom:20px;font-size:1.3em}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.toc-card{background:var(--card);border:1px solid #2a2018;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:.2s}
.toc-card:hover{border-color:var(--fire);transform:translateY(-2px)}
.toc-card .num{font-size:1.3em;color:var(--fire);font-weight:700}
.toc-card .title{font-size:.85em;color:var(--cream);margin-top:4px}
.content{max-width:900px;margin:0 auto;padding:20px}
.chapter{background:var(--card);border:1px solid #2a2018;border-radius:12px;padding:28px;margin-bottom:20px}
.chapter h2{color:var(--fire);font-size:1.3em;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #2a2018}
.chapter p{margin-bottom:10px;font-size:.95em;color:#ddd6ce}
.chapter .highlight{background:rgba(192,57,43,.1);border-left:3px solid var(--fire);padding:10px 14px;margin:12px 0;border-radius:0 6px 6px 0;font-size:.9em;color:var(--accent)}
.chapter table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85em}
.chapter td,.chapter th{border:1px solid #2a2018;padding:8px 10px;text-align:left}
.chapter th{background:var(--fire);color:#fff;font-weight:600}
.chapter tr:nth-child(even){background:rgba(255,255,255,.03)}
.footer{text-align:center;padding:30px;color:var(--dim);font-size:.85em}
@media(max-width:600px){.hero h1{font-size:1.6em}.toc-grid{grid-template-columns:repeat(2,1fr)}.chapter{padding:16px}}
</style>
</head>
<body>
<div class="hero">
<h1>🐋 鲸岚·烧鸟</h1>
<div class="sub">开业引流方案 · 以美团智能收银为核心的全渠道运营方案</div>
<div class="info">
鲸岚·烧鸟（日式烧烤）+ 精酿空间（合伙经营）<br>
位置：天津·中原·瞰海一楼（商场入口旁）<br>
收银系统：美团智能版收银 | 楼上三楼：鲸岚烧肉同步装修中
</div>
</div>

<div class="toc">
<h2>📋 目 录</h2>
<div class="toc-grid" id="tocGrid">
</div>
</div>

<div class="content" id="content">
</div>

<div class="footer">
编制人：娄苏 | 美团SAAS · 2026年5月（完整版）
</div>

<script>
const chapters = [
  {num:"1",title:"一、背景概述",sub:"门店信息 · 定位 · 核心目标",content:`<p>一、背景概述</p>`},
  {num:"2",title:"二、整体策略框架",sub:"六管齐下策略体系",content:`<p>二、整体策略框架</p>`},
  {num:"3",title:"三、开业前线下引流（核心：装修期二维码铺设，提前45天）",sub:"装修期二维码铺设 · 提前45天",content:`<p>三、开业前线下引流（核心：装修期二维码铺设，提前45天）</p>`},
  {num:"4",title:"四、DM单版面设计",sub:"A5双面 · 双二维码 · 优惠栏",content:`<p>四、DM单版面设计</p>`},
  {num:"5",title:"五、开业后全渠道会员自动沉淀",sub:"扫码点餐 · 团购核销 · 收银台引导",content:`<p>五、开业后全渠道会员自动沉淀</p>`},
  {num:"6",title:"六、复购券与二次营销策略",sub:"复购券 · 唤醒券 · 会员日",content:`<p>六、复购券与二次营销策略</p>`},
  {num:"7",title:"七、开业现场活动设计",sub:"68元套餐 · 8.8折 · 发圈赠菜",content:`<p>七、开业现场活动设计</p>`},
  {num:"8",title:"八、精酿空间专项运营",sub:"精酿引流 · 联动合作 · 竞争应对",content:`<p>八、精酿空间专项运营</p>`},
  {num:"9",title:"九、大众点评运营策略与KPI",sub:"内测 · 合规评价 · 新店榜",content:`<p>九、大众点评运营策略与KPI</p>`},
  {num:"10",title:"十、抖音运营策略与KPI",sub:"达人矩阵 · 本地推 · 团购组品",content:`<p>十、抖音运营策略与KPI</p>`},
  {num:"11",title:"十一、小红书运营策略与KPI",sub:"矩阵号 · 四种模板 · UGC激发",content:`<p>十一、小红书运营策略与KPI</p>`},
  {num:"12",title:"十二、收银系统配合流程与话术标准化",sub:"五句话术 · 台卡布置",content:`<p>十二、收银系统配合流程与话术标准化</p>`},
  {num:"13",title:"十三、活动节奏总览（完整时间轴）",sub:"蓄水→预热→爆发→积累→稳定",content:`<p>十三、活动节奏总览（完整时间轴）</p>`},
  {num:"14",title:"十四、预算汇总（含必做/选做分档）",sub:"三档预算 · 基础/标准/完整",content:`<p>十四、预算汇总（含必做/选做分档）</p>`},
  {num:"15",title:"十五、KPI总览",sub:"评分 · 收藏 · 核销率 · 营收",content:`<p>十五、KPI总览</p>`},
  {num:"16",title:"十六、竞品分析",sub:"周边竞品 · 差异化优势",content:`<p>十六、竞品分析</p>`},
  {num:"17",title:"十七、总结",sub:"核心策略总结",content:`<p>十七、总结</p>`},
];

const tg=document.getElementById('tocGrid');
const ct=document.getElementById('content');
chapters.forEach((ch,i)=>{
  const btn=document.createElement('div');btn.className='toc-card';btn.style.cursor='pointer';
  btn.innerHTML='<div class="num">'+ch.num+'</div><div class="title">'+ch.title+'</div>';
  btn.onclick=()=>{
    document.getElementById('ch'+ch.num).scrollIntoView({behavior:'smooth'});
  };
  tg.appendChild(btn);
  
  const div=document.createElement('div');div.className='chapter';div.id='ch'+ch.num;
  div.innerHTML='<h2>'+ch.num+'. '+ch.title+'</h2>'+ch.content;
  ct.appendChild(div);
});
</script>
</body>
</html>
