<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鲸岚·烧鸟 · 开业全渠道运营方案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0806;
  --bg2: #120e0a;
  --bg3: #1a1410;
  --bg4: #221c16;
  --fire: #d4561e;
  --fire2: #e85d26;
  --fire3: #ff6b35;
  --amber: #f0b429;
  --gold: #c9a84c;
  --cream: #e8ddd0;
  --text: #d4c8b8;
  --text2: #b8a898;
  --dim: #8a7a6a;
  --dimmer: #5a4a3a;
  --border: rgba(212,86,30,0.08);
  --border2: rgba(212,86,30,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.8}

/* ===== 粒子背景 ===== */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ===== 导航 ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,8,6,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.nav.hidden{transform:translateY(-100%)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Noto Serif SC',serif;font-weight:900;font-size:18px;background:linear-gradient(135deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.nav-logo .ico{font-size:20px;-webkit-text-fill-color:initial}
.nav-links{display:flex;gap:2px;flex-wrap:wrap}
.nav-links a{color:var(--dimmer);text-decoration:none;font-size:11px;padding:4px 8px;border-radius:4px;transition:all .3s;font-weight:500}
.nav-links a:hover{color:var(--amber);background:rgba(212,86,30,.1)}
.nav-links a.active{color:var(--fire2);background:rgba(212,86,30,.12)}
.nav-toggle{display:none;background:none;border:none;color:var(--cream);font-size:24px;cursor:pointer;padding:4px}

/* ===== Hero ===== */
.hero{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 20px 60px;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 80%,rgba(212,86,30,.12) 0%,transparent 60%),radial-gradient(ellipse at 30% 20%,rgba(240,180,41,.06) 0%,transparent 40%),radial-gradient(ellipse at 70% 40%,rgba(255,107,53,.04) 0%,transparent 30%);pointer-events:none}
.hero-glow{position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(212,86,30,.15) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 20px;border:1px solid var(--fire);border-radius:20px;font-size:12px;color:var(--fire2);letter-spacing:3px;margin-bottom:24px;animation:fadeUp .8s ease}
.hero h1{font-family:'Noto Serif SC',serif;font-size:clamp(48px,10vw,96px);font-weight:900;line-height:1.05;margin-bottom:4px;animation:fadeUp .8s ease .1s both}
.hero h1 .c1{color:var(--fire)}.hero h1 .c2{color:var(--amber)}.hero h1 .c3{color:var(--cream)}
.hero-sub{font-size:clamp(14px,2.2vw,20px);color:var(--dim);font-weight:300;letter-spacing:6px;margin-bottom:8px;animation:fadeUp .8s ease .12s both}
.hero-desc{font-size:clamp(13px,1.6vw,16px);color:var(--dimmer);font-weight:300;letter-spacing:2px;margin-bottom:36px;animation:fadeUp .8s ease .14s both}
.hero-stats{display:flex;gap:48px;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s ease .18s both}
.hero-stat{text-align:center}
.hero-stat-num{font-family:'Noto Serif SC',serif;font-size:36px;font-weight:700;color:var(--amber)}
.hero-stat-lbl{font-size:12px;color:var(--dimmer);margin-top:2px;letter-spacing:1px}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:28px;animation:fadeUp .8s ease .22s both}
.hero-tag{padding:5px 16px;background:rgba(212,86,30,.06);border:1px solid var(--border2);border-radius:16px;font-size:12px;color:var(--text2)}
.hero-cta{margin-top:36px;animation:fadeUp .8s ease .26s both}
.hero-cta a{display:inline-flex;align-items:center;gap:8px;padding:14px 40px;background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff;text-decoration:none;border-radius:30px;font-size:15px;font-weight:500;transition:all .3s;box-shadow:0 4px 24px rgba(212,86,30,.25)}
.hero-cta a:hover{transform:translateY(-3px);box-shadow:0 8px 36px rgba(212,86,30,.4)}
.hero-scroll{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--dimmer);font-size:11px;letter-spacing:2px;animation:bounce 2s ease infinite;cursor:pointer}
.hero-scroll .arr{width:20px;height:20px;border-right:1.5px solid var(--dimmer);border-bottom:1.5px solid var(--dimmer);transform:rotate(45deg);animation:bounceArr 2s ease infinite}

/* ===== 分隔 ===== */
.divider{position:relative;z-index:1;height:60px;display:flex;align-items:center;justify-content:center;gap:12px}
.divider .line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--fire),transparent)}
.divider .dot{width:6px;height:6px;background:var(--fire);border-radius:50%;animation:pulse 2s ease infinite}

/* ===== 目录 ===== */
.toc{position:relative;z-index:1;padding:60px 20px 40px;max-width:960px;margin:0 auto}
.toc-hdr{text-align:center;margin-bottom:40px}
.toc-hdr .num{font-family:'Noto Serif SC',serif;font-size:14px;color:var(--fire);letter-spacing:4px;margin-bottom:4px}
.toc-hdr h2{font-family:'Noto Serif SC',serif;font-size:30px;color:var(--cream);margin-bottom:6px}
.toc-hdr p{color:var(--dim);font-size:13px}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.toc-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);border-radius:10px;cursor:pointer;transition:all .35s;text-align:left;color:var(--text);font-size:13px;font-family:'Noto Sans SC',sans-serif}
.toc-btn:hover{background:rgba(212,86,30,.06);border-color:var(--border2);transform:translateY(-2px)}
.toc-btn .num{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--fire);min-width:28px;opacity:.7}
.toc-btn .arrow{color:var(--fire);font-size:14px;transition:transform .3s;margin-left:auto}
.toc-btn:hover .arrow{transform:translateX(4px)}

/* ===== 内容 ===== */
.content{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 20px 80px}
.chapter{margin-bottom:60px;opacity:0;transform:translateY(30px);transition:all .7s cubic-bezier(.4,0,.2,1)}
.chapter.show{opacity:1;transform:translateY(0)}
.ch-hdr{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.ch-num{font-family:'Noto Serif SC',serif;font-size:42px;font-weight:900;color:var(--fire);line-height:1;opacity:.4;min-width:50px}
.ch-info{flex:1}
.ch-title{font-family:'Noto Serif SC',serif;font-size:24px;color:var(--cream)}
.ch-sub{font-size:12px;color:var(--dimmer);margin-top:2px;letter-spacing:1px}
.ch-badge{display:inline-block;padding:3px 12px;background:rgba(212,86,30,.1);border:1px solid var(--border2);border-radius:12px;font-size:11px;color:var(--fire2)}
.chapter p{color:var(--text2);font-size:14px;line-height:2;margin-bottom:10px}
.chapter p.dim{color:var(--dim);font-size:13px}
.chapter p.strong{color:var(--cream);font-weight:500}
.chapter p.highlight{padding:12px 16px;background:rgba(212,86,30,.04);border-left:3px solid var(--fire);border-radius:0 6px 6px 0;font-size:13px;color:var(--text)}

/* ===== 卡片 ===== */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:16px 0}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin:16px 0}
.card{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:18px;text-align:center;transition:all .3s}
.card:hover{background:var(--bg4);border-color:var(--border2)}
.card .v{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;color:var(--amber)}
.card .l{font-size:12px;color:var(--dim);margin-top:3px}

/* ===== 表格 ===== */
.tbl-wrap{overflow-x:auto;margin:16px 0;border-radius:8px;border:1px solid rgba(255,255,255,.03)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
.tbl th{background:rgba(212,86,30,.1);color:var(--amber);padding:10px 14px;text-align:left;font-weight:500;border-bottom:2px solid var(--fire);white-space:nowrap}
.tbl td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.02);color:var(--text2)}
.tbl tr:hover td{background:rgba(255,255,255,.01)}
.tbl tr:last-child td{border-bottom:none}

/* ===== 功能卡片 ===== */
.feat{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:16px 0}
.feat-card{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:20px;text-align:center;position:relative;overflow:hidden;transition:all .3s}
.feat-card:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-2px)}
.feat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fire),var(--amber))}
.feat-card .ic{font-size:30px;margin-bottom:8px}
.feat-card h4{font-size:15px;color:var(--cream);margin-bottom:4px}
.feat-card p{font-size:12px!important;color:var(--dim)!important;line-height:1.7!important}

/* ===== 套餐卡片 ===== */
.pkg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin:16px 0}
.pkg-card{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:12px;padding:28px 22px;text-align:center;position:relative;overflow:hidden;transition:all .3s}
.pkg-card:hover{transform:translateY(-3px);border-color:var(--border2)}
.pkg-card.hot{border-color:var(--border2);background:linear-gradient(180deg,rgba(212,86,30,.06),var(--bg3))}
.pkg-card.hot::before{content:'推荐';position:absolute;top:12px;right:-28px;background:var(--fire);color:#fff;font-size:10px;padding:2px 32px;transform:rotate(45deg);letter-spacing:1px}
.pkg-card .tag{font-size:11px;color:var(--fire2);margin-bottom:4px;letter-spacing:1px}
.pkg-card .nm{font-family:'Noto Serif SC',serif;font-size:19px;color:var(--cream);margin-bottom:4px}
.pkg-card .pr{font-family:'Noto Serif SC',serif;font-size:34px;font-weight:900;color:var(--amber);margin-bottom:8px}
.pkg-card .pr small{font-size:14px;color:var(--dim)}
.pkg-card .desc{font-size:12px;color:var(--dim);line-height:1.8}

/* ===== 标签 ===== */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.tag{padding:4px 14px;background:rgba(212,86,30,.04);border:1px solid var(--border);border-radius:14px;font-size:12px;color:var(--text2);transition:all .2s}
.tag:hover{background:rgba(212,86,30,.08);border-color:var(--border2)}

/* ===== 对比 ===== */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.cmp-col{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:18px}
.cmp-col h4{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cmp-col.g h4{color:var(--amber)}
.cmp-col.b h4{color:var(--dim)}
.cmp-col p{font-size:12px!important;color:var(--dim)!important;margin-bottom:4px!important;line-height:1.7!important}

/* ===== 风险 ===== */
.risk{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:16px 0}
.risk-card{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:20px;transition:all .3s}
.risk-card:hover{background:var(--bg4);border-color:var(--border2)}
.risk-card .rl{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;margin-bottom:8px;font-weight:500}
.risk-card .rl.h{background:rgba(212,86,30,.15);color:var(--fire2)}
.risk-card .rl.m{background:rgba(240,180,41,.1);color:var(--amber)}
.risk-card .rl.l{background:rgba(100,200,100,.06);color:#6c6}
.risk-card h4{font-size:14px;color:var(--cream);margin-bottom:6px}
.risk-card p{font-size:12px!important;color:var(--dim)!important;line-height:1.7!important}

/* ===== 客群 ===== */
.aud{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.aud-item{background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;padding:16px;text-align:center;transition:all .3s}
.aud-item:hover{background:var(--bg4);border-color:var(--border2)}
.aud-item .p{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;color:var(--fire)}
.aud-item .l{font-size:12px;color:var(--dim);margin-top:3px}

/* ===== 时间轴 ===== */
.timeline{position:relative;margin:20px 0;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--fire),var(--amber),var(--fire))}
.tl-item{position:relative;margin-bottom:20px;padding:16px 20px;background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:10px;transition:all .3s}
.tl-item:hover{background:var(--bg4);border-color:var(--border2)}
.tl-item::before{content:'';position:absolute;left:-24px;top:20px;width:12px;height:12px;background:var(--fire);border-radius:50%;border:3px solid var(--bg)}
.tl-item .tl-phase{font-size:11px;color:var(--fire2);letter-spacing:2px;margin-bottom:2px}
.tl-item .tl-time{font-size:12px;color:var(--dimmer);margin-bottom:4px}
.tl-item .tl-title{font-size:15px;color:var(--cream);font-weight:500;margin-bottom:4px}
.tl-item .tl-desc{font-size:12px;color:var(--dim);line-height:1.7}

/* ===== 预算 ===== */
.budget-tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
.budget-tab{padding:8px 20px;background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:8px;cursor:pointer;font-size:13px;color:var(--dim);transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.budget-tab:hover{background:var(--bg4);border-color:var(--border2)}
.budget-tab.active{background:rgba(212,86,30,.1);border-color:var(--fire);color:var(--fire2)}
.budget-content{display:none}
.budget-content.active{display:block}
.budget-total{text-align:center;padding:16px;margin-top:12px;background:rgba(212,86,30,.06);border:1px solid var(--border2);border-radius:10px}
.budget-total .v{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:900;color:var(--amber)}
.budget-total .l{font-size:12px;color:var(--dim);margin-top:2px}

/* ===== 品牌关系图 ===== */
.brand-tree{display:flex;flex-direction:column;align-items:center;gap:16px;margin:20px 0;padding:24px;background:var(--bg3);border:1px solid rgba(255,255,255,.03);border-radius:12px}
.brand-root{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--cream);padding:8px 24px;background:rgba(212,86,30,.08);border:1px solid var(--border2);border-radius:8px}
.brand-branch{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.brand-node{padding:10px 20px;border-radius:8px;text-align:center;min-width:160px}
.brand-node.main{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.2)}
.brand-node.main .nm{color:var(--amber);font-weight:700}
.brand-node.partner{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)}
.brand-node.partner .nm{color:var(--dim)}
.brand-node .nm{font-size:14px;margin-bottom:2px}
.brand-node .info{font-size:11px;color:var(--dimmer)}
.brand-connector{color:var(--dimmer);font-size:12px;letter-spacing:2px}

/* ===== 页脚 ===== */
.footer{position:relative;z-index:1;text-align:center;padding:50px 20px;border-top:1px solid var(--border)}
.footer .br{font-family:'Noto Serif SC',serif;font-size:20px;background:linear-gradient(135deg,var(--fire),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.footer .cr{color:var(--dimmer);font-size:12px}

/* ===== 动画 ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@keyframes bounceArr{0%,100%{opacity:.3}50%{opacity:1}}

/* ===== 响应式 ===== */
@media(max-width:768px){
  .nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:rgba(10,8,6,.95);backdrop-filter:blur(24px);padding:12px;flex-direction:column;border-bottom:1px solid var(--border)}
  .nav-links.open{display:flex}
  .nav-toggle{display:block}
  .hero-stats{gap:24px}
  .toc-grid,.pkg,.feat{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr 1fr}
  .cmp{grid-template-columns:1fr}
  .brand-branch{flex-direction:column;align-items:center}
  .ch-num{font-size:32px;min-width:36px}
  .ch-title{font-size:20px}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<nav class="nav" id="nav">
  <div class="nav-logo"><span class="ico">🐋</span> 鲸岚·烧鸟</div>
  <button class="nav-toggle" id="navToggle">☰</button>
  <div class="nav-links" id="navLinks"></div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-glow"></div>
  <div class="hero-badge">✦ 以美团智能收银为核心的全渠道运营方案 ✦</div>
  <h1><span class="c1">鲸岚</span><span class="c2">·</span><span class="c3">烧鸟</span></h1>

  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num">45天</div><div class="hero-stat-lbl">装修期蓄水</div></div>
    <div class="hero-stat"><div class="hero-stat-num">1500+</div><div class="hero-stat-lbl">预计领券</div></div>
    <div class="hero-stat"><div class="hero-stat-num">¥3K-15.6K</div><div class="hero-stat-lbl">预算三档</div></div>
    <div class="hero-stat"><div class="hero-stat-num">8万+</div><div class="hero-stat-lbl">首月营收</div></div>
  </div>
  <div class="hero-tags">
    <span class="hero-tag">🐋 鲸岚品牌</span>
    <span class="hero-tag">🔥 日式烧鸟</span>
    <span class="hero-tag">🍺 精酿联动</span>
    <span class="hero-tag">📱 三平台运营</span>

  </div>

</section>

<div class="divider"><span class="line"></span><span class="dot"></span><span class="line"></span></div>

<!-- ===== 目录 ===== -->
<section class="toc" id="toc">
  <div class="toc-hdr">
    <div class="num">✦ 目 录 ✦</div>
    <h2>鲸岚·烧鸟 全案营销方案</h2>
    <p>共 17 个章节 · 点击任意章节直接跳转</p>
  </div>
  <div class="toc-grid" id="tocGrid"></div>
</section>

<!-- ===== 内容 ===== -->
<section class="content" id="content"></section>

<!-- ===== 页脚 ===== -->
<footer class="footer">
  <div class="br">🐋 鲸岚·烧鸟</div>
  <p class="cr">编制：娄苏 | 美团SAAS &nbsp;·&nbsp; 2026年5月（完整版）</p>
</footer>

<script>
// ===== 粒子系统 =====
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let pts=[],embers=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();addEventListener('resize',resize);

class Pt{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*2+.3;this.sx=(Math.random()-.5)*.25;this.sy=-Math.random()*.15-.05;this.o=Math.random()*.3+.05}
  update(){this.x+=this.sx;this.y+=this.sy;if(this.y<-10||this.x<-10||this.x>canvas.width+10)this.reset();if(this.y<canvas.height*.25)this.y=canvas.height}
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`rgba(212,86,30,${this.o})`;ctx.fill()}
}

class Em{
  constructor(){this.x=Math.random()*canvas.width;this.y=canvas.height-10;this.size=Math.random()*3+1;this.sy=Math.random()*1.2+.3;this.sx=(Math.random()-.5)*.4;this.l=1;this.d=Math.random()*.006+.003}
  update(){this.y-=this.sy;this.x+=this.sx;this.l-=this.d}
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.l,0,Math.PI*2);let g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*this.l);g.addColorStop(0,`rgba(255,107,53,${this.l})`);g.addColorStop(.4,`rgba(240,180,41,${this.l*.5})`);g.addColorStop(1,`rgba(212,86,30,0)`);ctx.fillStyle=g;ctx.fill()}
}

function spawn(){if(Math.random()<.12)embers.push(new Em())}
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.update();p.draw()});spawn();embers.forEach(e=>{e.update();e.draw()});embers=embers.filter(e=>e.l>0);if(embers.length>50)embers.splice(0,embers.length-50);requestAnimationFrame(anim)}
for(let i=0;i<60;i++)pts.push(new Pt());anim();

// ===== 导航 =====
document.getElementById('navToggle').onclick=()=>document.getElementById('navLinks').classList.toggle('open');

let lastScroll=0;
addEventListener('scroll',()=>{
  const y=scrollY,nav=document.getElementById('nav');
  if(y>200)nav.classList.toggle('hidden',y>lastScroll&&y>400);else nav.classList.remove('hidden');
  lastScroll=y;
  // 高亮当前章节
  document.querySelectorAll('.chapter').forEach(ch=>{
    const id=ch.id.replace('ch-','');
    const a=document.querySelector(`.nav-links a[href="#ch-${id}"]`);
    if(a){
      const rect=ch.getBoundingClientRect();
      a.classList.toggle('active',rect.top<200&&rect.bottom>200);
    }
  });
});

</div>`},

{num:'08',title:'精酿空间专项运营',sub:'引流策略 / 联动合作 / 竞争应对',badge:'联动',
content:`<p>精酿空间为合伙经营，与鲸岚·烧鸟分属不同品牌。未来对面外滩将形成精酿一条街，需提前建立竞争优势。</p>
<p><strong>精酿空间引流策略：</strong></p>
<p>· 19.9元精酿品鉴套餐（3杯不同口味），降低尝鲜门槛</p>
<p>· 每周五精酿品鉴会（付费预约制），打造社群粘性</p>
<p>· 精酿会员储值：充300赠50，充500赠120，锁定复购</p>
<p>· 精酿生日派对/团建包场服务，拓展企业客户</p>
<p><strong>与鲸岚·烧鸟的联动合作：</strong></p>
<p>· 联合套餐：推出「烧鸟+精酿」联名套餐，一票两店使用</p>
<p>· 互相导流：鲸岚·烧鸟消费满100元赠精酿空间体验券；精酿空间顾客到店赠鲸岚·烧鸟9折券</p>
<p>· 共用私域：两店共用微信群，联合推送活动信息</p>
<p><strong>精酿一条街竞争应对：</strong></p>
<p>· 提前建立精酿社群，积累种子用户，打造社群壁垒</p>
<p>· 打造「烧鸟+精酿」差异化组合——这是精酿一条街其他纯酒吧无法提供的用餐体验</p>
<p>· 培养精酿KOC客户，形成口碑传播</p>
<p>· 定期举办精酿品鉴课/酿酒体验活动，建立专业认知</p>`},

{num:'09',title:'大众点评运营策略',sub:'合规运营 / 新店榜冲刺 / 关键词优化',badge:'平台',
content:`<p><strong>平台机制（2026年）：</strong>严厉打击"赠菜换好评"。"真实评价数+近30天回复率+顾客证言质量"成排名核心。带图带细节的真实评价权重是简单好评的5倍。新店有流量倾斜。</p>
<p><strong>执行动作：</strong></p>
<p><strong>① 开业前内测+橙V免费体验：</strong>开业前2天，邀请30-50人免费体验，要求发布带图真实评价。食材成本约500元。</p>
<p><strong>② 合规引导自然评价：</strong>每桌结账后服务员引导扫码评价（不提任何赠品）。重点维护差评，24小时内回复致歉+补偿方案。</p>
<p><strong>③ 关键词密度优化：</strong>引导评价中包含：烧鸟拼盘、鸡腿肉、提灯、酱烤盐烤、炭火香气、紫苏鸡腿肉、明太子鸡肉棒、日式前菜、环境安静、出餐快。</p>
<p><strong>④ 冲击新店榜：</strong>申请「新店推荐」资质认证。冲刺路径：区域新店榜Top10→南开区烧烤榜Top5→「必吃榜」「热门榜」双榜上榜。</p>
<p><strong>KPI：</strong></p>
<div class="grid2">
<div class="card"><div class="v">4.0星</div><div class="l">首月评分</div></div>
<div class="card"><div class="v">100条+</div><div class="l">首月评价</div></div>
<div class="card"><div class="v">500个</div><div class="l">首月收藏</div></div>
<div class="card"><div class="v">70%</div><div class="l">团购核销率</div></div>
</div>`},

{num:'10',title:'抖音运营策略',sub:'达人矩阵 / 本地推投流 / 团购组品',badge:'平台',
content:`<p><strong>平台机制（2026年）：</strong>算法转向"内容质量×交易效率×POI资产"三维评分。"有效转化率"权重升至42%。同城搜索流量占比31%。</p>
<p><strong>执行动作：</strong></p>
<p><strong>① 真实原生内容矩阵（每天发布）：</strong>炭火特写+烧鸟滋滋冒油画面+环境氛围；顾客真实用餐场景+套餐展示。必须添加POI位置，启用"DOU+同城定向"。</p>
<p><strong>② 达人探店矩阵投放：</strong>总预算6000元。选择本地美食类达人，要求视频包含POI定位+团购链接。</p>
<p><strong>③ 本地推精准投流：</strong>地理围栏门店周边3公里，人群18-35岁美食/日料兴趣。开业前7天开始，首周1000元，次周500元，第三四周各250元→总计2000元。</p>
<p><strong>④ 抖音团购组品：</strong>68元双人套餐（与点评一致，便于统一核销）。</p>
<p><strong>KPI：</strong></p>

<div class="card"><div class="v">50%</div><div class="l">团购核销率</div></div>

</div>`},

{num:'11',title:'小红书运营策略',sub:'矩阵号 / 4类模板 / UGC激发',badge:'平台',
content:`<p><strong>平台机制（2026年）：</strong>流量极度偏向"真实、就近、有用、可抄"的同城内容。日式烧鸟的高颜值属性与小红书图文调性天然契合。</p>

<p><strong>④ 老顾客UGC激发：</strong>顾客拍照时主动让位置，用餐结束后引导分享。在社群发起"鲸岚探店日记"UGC活动，优秀笔记送50元券。</p>

{num:'12',title:'收银系统配合流程与话术标准化',sub:'全链路流程 / 五句话术 / 台卡布置',badge:'执行',
content:`<p><strong>收银系统全链路流程：</strong></p>
<p>步骤一：后台营销设置 — 创建满50元可用10元通用券，生成领券二维码</p>
<p>步骤二：装修期铺设 — 围挡/便利店/试吃台铺设二维码，顾客扫码领券</p>
<p>步骤三：顾客到店核销 — 报手机号→收银员查询→系统一键核销→自动留存会员</p>
<p>步骤四：复购券自动推送 — 消费后次日系统自动发复购券，5天未复购再次触达</p>
<p>步骤五：私域加群沉淀 — 收银台摆放加群二维码及红包规则立牌</p>
<p>步骤六：合规口碑引导 — 固定摆放官方点星、收藏二维码</p>
<p><strong>收银员五句话术标准化：</strong></p>
<p class="highlight">1. 核销话术：「您好，您的优惠券已核销，欢迎下次光临。」<br>2. 满赠话术：「今天消费已满100元，赠您一张精酿空间体验券，欢迎去隔壁坐坐。」<br>3. 会员引导：「您还没加入会员吧？报一下手机号，以后消费有积分，今天加入额外送您一份小菜。」<br>4. 口碑引导：「您吃得满意的话，方便的话帮我们点个星、收藏一下，非常感谢。」<br>5. 品牌联动：「楼上鲸岚烧肉也在装修中，开业后凭我们小票到楼上也有优惠哦。」</p>
<p><strong>台卡布置：</strong></p>
<p>台卡①：消费满100元赠精酿空间体验券（与精酿空间合作）</p>
<p>台卡②：社群加群二维码+新人红包规则</p>
<p>台卡③：鲸岚烧肉品牌联动——凭小票互享优惠</p>
<p>台卡④：官方点星码+收藏二维码（合规摆放）</p>`},

{num:'17',title:'总结',sub:'核心策略 / 预算 / KPI',badge:'总结',
content:`<p>本方案以美团智能版收银系统为核心，围绕鲸岚·烧鸟的独特优势——<strong>鲸岚品牌背书 + 商场出入口位置 + 装修期45天蓄水 + 精酿空间联动</strong>——制定了完整的开业前线下引流及前期营销方案。</p>
<p><strong>核心策略：</strong></p>

<p>· 以私域社群和复购券自动化为长期复购保障</p>
<p>· 以精酿空间联动打造「烧鸟+精酿」差异化体验</p>
<p><strong>预算三档可选：</strong></p>
<div class="grid2">

<div class="card" style="border-color:var(--border2)"><div class="v" style="color:var(--amber)">¥8,000</div><div class="l">标准版 · 推荐配置</div></div>
<div class="card" style="border-color:var(--fire)"><div class="v" style="color:var(--fire)">¥15,600</div><div class="l">完整版 · 全渠道覆盖</div></div>
</div>
<p><strong>核心目标：</strong></p>
<div class="grid2">
<div class="card"><div class="v">4.0星+</div><div class="l">点评评分</div></div>
<div class="card"><div class="v">500个</div><div class="l">收藏打卡</div></div>
<div class="card"><div class="v">70%</div><div class="l">团购核销率</div></div>

</div>
<p class="highlight">从开业前45天到开业后三个月，全链路覆盖，让鲸岚·烧鸟从开业第一天起就赢在起跑线。</p>`}
];

// ===== 渲染 =====
const tg=document.getElementById('tocGrid'),ct=document.getElementById('content'),nl=document.getElementById('navLinks');
chapters.forEach((ch,i)=>{
  const btn=document.createElement('button');btn.className='toc-btn';
  btn.innerHTML='<span class="num">'+ch.num+'</span><span>'+ch.title+'</span><span class="arrow">→</span>';
  btn.onclick=()=>document.getElementById('ch-'+i).scrollIntoView({behavior:'smooth'});
  tg.appendChild(btn);
  const a=document.createElement('a');a.href='#ch-'+i;a.textContent=ch.num;a.title=ch.title;nl.appendChild(a);
  const d=document.createElement('div');d.className='chapter';d.id='ch-'+i;
  d.innerHTML='<div class="ch-hdr"><span class="ch-num">'+ch.num+'</span><div class="ch-info"><div class="ch-title">'+ch.title+'</div><div class="ch-sub">'+ch.sub+'</div></div><span class="ch-badge">'+ch.badge+'</span></div>'+ch.content;
  ct.appendChild(d);
});

// ===== 滚动动画 =====
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')})},{threshold:.08});
document.querySelectorAll('.chapter').forEach(el=>obs.observe(el));

// ===== 预算切换 =====
function switchBudget(id){
  document.querySelectorAll('.budget-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.budget-content').forEach(c=>c.classList.remove('active'));
  document.querySelector('.budget-tab[onclick*="'+id+'"]').classList.add('active');
  document.getElementById('budget'+id.charAt(0).toUpperCase()+id.slice(1)).classList.add('active');
}
</script>
</body>
</html>
